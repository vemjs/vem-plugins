name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Wait for core packages
        run: |
          CORE_VERSION=$(node -p "require('./package.json').devDependencies['@vemjs/core'].replace(/^[^0-9]*/, '')")
          PLUGIN_API_VERSION=$(node -p "require('./package.json').devDependencies['@vemjs/plugin-api'].replace(/^[^0-9]*/, '')")
          for i in {1..30}; do
            if npm view "@vemjs/core@$CORE_VERSION" version >/dev/null 2>&1 && npm view "@vemjs/plugin-api@$PLUGIN_API_VERSION" version >/dev/null 2>&1; then
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for @vemjs/core@$CORE_VERSION and @vemjs/plugin-api@$PLUGIN_API_VERSION to be available on npm" >&2
          exit 1

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint
